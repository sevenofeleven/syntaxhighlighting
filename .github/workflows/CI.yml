name: Java CI with Gradle

on:
    pull_request:
    workflow_dispatch:

jobs:
    build:

        runs-on: ubuntu-latest
        permissions:
            contents: read

        steps:
            - uses: actions/checkout@v6
            - name: Set up JDK 25
              uses: actions/setup-java@v5
              with:
                  java-version: '25'
                  distribution: 'temurin'

            - name: Setup Gradle
              uses: gradle/actions/setup-gradle@v6

            - name: Kompilieren
              run: ./gradlew build

            - name: Tests ausführen
              run: ./gradlew test

            - name: Formatierung überprüfen
              run: ./gradlew spotlessCheck
